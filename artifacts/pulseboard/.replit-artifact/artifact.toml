kind = "web"
previewPath = "/pulseboard/"
title = "PulseBoard"
version = "1.0.0"
id = "artifacts/pulseboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pulseboard/" ]
localPort = 25832

[services.development]
run = "bash -c 'cd /home/runner/workspace/pulseboard/frontend && npm run dev'"

[services.production]
build = [ "bash", "-c", "cd /home/runner/workspace/pulseboard/frontend && npm install && npm run build" ]
publicDir = "pulseboard/frontend/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25832"
BASE_PATH = "/pulseboard/"
